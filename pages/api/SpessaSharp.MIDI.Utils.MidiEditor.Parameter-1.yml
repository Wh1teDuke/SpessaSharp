  summary: >-
    Represents a value that means "clear this parameter" instead of "replace this parameter with".

    Essentially:


    <ul><li><b>Clear</b> - clear all changes of this parameter from the MIDI file.</li><li><b>Replace</b> - clear all changes of this parameter from the MIDI file and add T.</li></ul>
