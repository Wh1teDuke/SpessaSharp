  source:
    remote:
      path: SpessaSharp/Synthesizer/Engine/Parameters/GlobalSystemParameter.cs
      branch: master
      repo: git@github.com:Wh1teDuke/SpessaSharp.git
    id: VoiceCap
    path: ../SpessaSharp/Synthesizer/Engine/Parameters/GlobalSystemParameter.cs
    startLine: 308
  assemblies:
  - SpessaSharp
  namespace: SpessaSharp.Synthesizer.Engine.Parameters
  summary: >-
    The maximum number of voices that can be played at once.

        Increasing this value causes memory allocation for more voices.
        It is recommended to set it at the beginning, before rendering audio to avoid GC.
        Decreasing it does not cause memory usage change, so it's fine to use.
  example: []
  syntax:
    content: VoiceCap = 2
    return:
      type: SpessaSharp.Synthesizer.Engine.Parameters.GlobalSystemParameter.Type
