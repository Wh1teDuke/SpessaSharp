  nameWithType: Synthesizer.ProcessSplit(ReadOnlySpan<(ArraySegment<float> Left, ArraySegment<float> Right)>, Span<float>, Span<float>, int, int?)
  fullName: SpessaSharp.Synthesizer.Synthesizer.ProcessSplit(System.ReadOnlySpan<(System.ArraySegment<float> Left, System.ArraySegment<float> Right)>, System.Span<float>, System.Span<float>, int, int?)
  type: Method
  source:
    remote:
      path: SpessaSharp/Synthesizer/Synthesizer.cs
      branch: master
      repo: git@github.com:Wh1teDuke/SpessaSharp.git
    id: ProcessSplit
    path: ../SpessaSharp/Synthesizer/Synthesizer.cs
    startLine: 709
  assemblies:
  - SpessaSharp
  namespace: SpessaSharp.Synthesizer
  summary: The main rendering pipeline, renders all voices and processes the effects
  remarks: >-
    <pre><code class="lang-csharp">               ┌────────────────────────────────┐
                   │        Voice Processor         │
                   └───────────────┬────────────────┘
                                   │
                   ┌───────────────┴────────────────┐
                   │      Insertion Processor       │
                   │      (Bypass or Process)       │
                   └───────────────┬────────────────┘
                                   │
              ┌──────────┬─────────┼────────────────────────┐
              │          │         │                        │
              │          │         v                        │
              │          │ ┌───────┴───────┐                │
              │          │ │    Chorus     │                │
              │          │ │   Processor   ├──────────┐     │
              │          │ └─┬──────────┬──┘          │     │
              │          │   │          │             │     │
              │          │   │          │             │     │
              │          │   │          │             │     │
              │          │   │          │             │     │
              │          │   │          v             v     v
              │          │   │ ┌────────┴───────┐   ┌─┴─────┴────────┐
              │          └───┼&gt;┤     Delay      ├─&gt;&gt;┤     Reverb     │
              │              │ │   Processor    │   │   Processor    │
              │              │ └────────┬───────┘   └───────┬────────┘
              │              │          │                   │
              │              │          │                   │
              │              │          │                   │
              │              │          │                   │
              v              v          v                   v
    ┌─────────┴──────────┐ ┌─┴──────────┴───────────────────┴────┐

    │  Dry Output Pairs  │ │        Stereo Effects Output        │

    └────────────────────┘ └─────────────────────────────────────┘</code></pre>


    The pipeline is quite similar to the one on SC-8850 manual page 78.

    All output arrays must be the same length, the method will crash otherwise.
  example: []
  syntax:
    content: public void ProcessSplit(ReadOnlySpan<(ArraySegment<float> Left, ArraySegment<float> Right)> outputs, Span<float> effectsLeft, Span<float> effectsRight, int startIndex = 0, int? samples = null)
    parameters:
    - id: outputs
      type: System.ReadOnlySpan{System.ValueTuple{System.ArraySegment{System.Single},System.ArraySegment{System.Single}}}
      description: The stereo pairs for each MIDI channel's dry output, will be wrapped if less.
    - id: effectsLeft
      type: System.Span{System.Single}
      description: The left stereo effect output buffer.
    - id: effectsRight
      type: System.Span{System.Single}
      description: The right stereo effect output buffer.
    - id: startIndex
      type: System.Int32
      description: The index to start writing at into the output buffer.
    - id: samples
      type: System.Nullable{System.Int32}
      description: The amount of samples to write.
    content.vb: Public Sub ProcessSplit(outputs As ReadOnlySpan(Of (Left As ArraySegment(Of Single), Right As ArraySegment(Of Single))), effectsLeft As Span(Of Single), effectsRight As Span(Of Single), startIndex As Integer = 0, samples As Integer? = Nothing)
