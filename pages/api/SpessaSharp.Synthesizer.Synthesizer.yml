  commentId: M:SpessaSharp.Synthesizer.Synthesizer.ProcessSplit(System.ReadOnlySpan{System.ValueTuple{System.ArraySegment{System.Single},System.ArraySegment{System.Single}}},System.Span{System.Single},System.Span{System.Single},System.Int32,System.Nullable{System.Int32})
