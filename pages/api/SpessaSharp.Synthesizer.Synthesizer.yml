  commentId: F:SpessaSharp.Synthesizer.Synthesizer.EFX_SENDS_GAIN_CORRECTION
  id: EFX_SENDS_GAIN_CORRECTION
  parent: SpessaSharp.Synthesizer.Synthesizer
  langs:
  - csharp
  - vb
  name: EFX_SENDS_GAIN_CORRECTION
  nameWithType: Synthesizer.EFX_SENDS_GAIN_CORRECTION
  fullName: SpessaSharp.Synthesizer.Synthesizer.EFX_SENDS_GAIN_CORRECTION
  type: Field
  source:
    remote:
      path: SpessaSharp/Synthesizer/Synthesizer.cs
      branch: master
      repo: git@github.com:Wh1teDuke/SpessaSharp.git
    id: EFX_SENDS_GAIN_CORRECTION
    path: ../SpessaSharp/Synthesizer/Synthesizer.cs
    startLine: 53
  assemblies:
  - SpessaSharp
  namespace: SpessaSharp.Synthesizer
  summary: >-
    This is needed because effects (regular ones) are send straight from the mono signal, whereas

    insertion effects receive the panned audio (twice), which reduces gain by a factor of cos(pi/4) * cos(pi/4) (master pan + voice pan).

    This reverses it.
  example: []
  syntax:
    content: public static readonly float EFX_SENDS_GAIN_CORRECTION
    return:
      type: System.Single
    content.vb: Public Shared ReadOnly EFX_SENDS_GAIN_CORRECTION As Single
