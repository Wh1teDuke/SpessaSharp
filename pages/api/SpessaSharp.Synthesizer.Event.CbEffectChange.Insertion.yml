  syntax:
    content: public Insertion(int Parameter, int Value)
    parameters:
    - id: Parameter
      type: System.Int32
      description: " The parameter that was changed. This maps to GS address map at addr2 = 0x03.<br />\n See SC-8850 Manual p.237,<br />\n for example:<br />\n - 0x0 - EFX type, the value is 16 bit in this special case. Note that this resets the parameters!<br />\n - 0x3 - EFX param 1<br />\n - 0x16 - EFX param 20 (usually level)<br />\n - 0x17 - EFX send to reverb<br />\n<br />\n There are two exceptions:<br />\n - -1 - the channel has ENABLED the effect.<br />\n - -2 - the channel has DISABLED the effect.<br />\n For both of these cases, `value` is the channel number.<br />"
    - id: Value
      type: System.Int32
      description: The new value for the parameter.
    content.vb: Public Sub New(Parameter As Integer, Value As Integer)
