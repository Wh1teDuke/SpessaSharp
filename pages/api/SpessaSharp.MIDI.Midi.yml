    id: From
    path: ../SpessaSharp/MIDI/Midi.cs
    startLine: 213
  assemblies:
  - SpessaSharp
  namespace: SpessaSharp.MIDI
  summary: Loads a MIDI file (SMF, RMIDI, XMF) from a given ArraySegment.
  remarks: >-
    This function reads the MIDI file format, extracts the header and track chunks,

    and populates the MIDI instance with the parsed data.

    It supports Standard MIDI Files (SMF), RIFF MIDI (RMIDI), and Extensible Music Format (XMF).

    It also handles embedded soundbanks in RMIDI files.

    If the file is an RMIDI file, it will extract the embedded soundbank and store

    it in the `embeddedSoundFont` property of the MIDI instance.

    If the file is an XMF file, it will parse the XMF structure and extract the MIDI data.
  example: []
  syntax:
    content: public static Midi From(ArraySegment<byte> bytes, string? fileName = null)
    parameters:
    - id: bytes
      type: System.ArraySegment{System.Byte}
      description: The ArraySegment containing the binary file data.
    - id: fileName
      type: System.String
      description: The optional name of the file, will be used if the MIDI file does not have a name.
    return:
      type: SpessaSharp.MIDI.Midi
    content.vb: Public Shared Function From(bytes As ArraySegment(Of Byte), fileName As String = Nothing) As Midi
  overload: SpessaSharp.MIDI.Midi.From*
