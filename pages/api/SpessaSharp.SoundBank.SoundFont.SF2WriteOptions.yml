  assemblies:
  - SpessaSharp
  namespace: SpessaSharp.SoundBank.SoundFont
  summary: Options for writing a SoundFont2 file.
  example: []
  syntax:
    content: public SF2WriteOptions(bool Compress, SoundBank.ProgressFunc? ProgressFunc, string? Software, bool WriteDefaultModulators, bool WriteExtendedLimits, bool Decompress)
    parameters:
    - id: Compress
      type: System.Boolean
      description: If the soundfont should be compressed with a given function. This changes the version to 3.0.
    - id: ProgressFunc
      type: SpessaSharp.SoundBank.SoundBank.ProgressFunc
      description: A function to show progress for writing large banks. It can be undefined.
    - id: Software
      type: System.String
      description: The `ISFT` field to set when writing. If unset, "SpessaSynth" is written. This field indicates the last software that was used to edit this sound bank.
    - id: WriteDefaultModulators
      type: System.Boolean
      description: If the DMOD chunk should be written. Recommended. Note that it will only be written if the modulators are unchanged.
    - id: WriteExtendedLimits
      type: System.Boolean
      description: If the XDTA chunk should be written to allow virtually infinite parameters. Recommended. Note that it will only be written needed.
    - id: Decompress
      type: System.Boolean
      description: If an SF3 bank should be decompressed back to SF2. Not recommended. This changes the version to 2.4.
    content.vb: Public Sub New(Compress As Boolean, ProgressFunc As SoundBank.ProgressFunc, Software As String, WriteDefaultModulators As Boolean, WriteExtendedLimits As Boolean, Decompress As Boolean)
