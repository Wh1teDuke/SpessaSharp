      branch: master
      repo: git@github.com:Wh1teDuke/SpessaSharp.git
    id: ModulationDepth
    path: ../SpessaSharp/Synthesizer/Engine/Channel/Parameters/ChannelMidiParameter.cs
    startLine: 312
  assemblies:
  - SpessaSharp
  namespace: SpessaSharp.Synthesizer.Engine.Channel.Parameters
  summary: >-
    The modulation depth in cents.

    This is internally converted to a multiplier by dividing by 50.


    The MIDI specification assumes the default modulation depth is 50 cents,

    but it may vary for different sound banks.

    For example, if a MIDI requests a modulation depth of 100 cents,

    the multiplier will be 2,

    which, for a preset with a depth of 50,

    will create a total modulation depth of 100 cents.
  example: []
  syntax:
    content: ModulationDepth = 3
    return:
      type: SpessaSharp.Synthesizer.Engine.Channel.Parameters.ChannelMidiParameter.Type
