- uid: SpessaSharp.Synthesizer.Engine.Channel.Parameters.ChannelMidiParameter.Type.VelocitySenseDepth
  commentId: F:SpessaSharp.Synthesizer.Engine.Channel.Parameters.ChannelMidiParameter.Type.VelocitySenseDepth
  id: VelocitySenseDepth
  parent: SpessaSharp.Synthesizer.Engine.Channel.Parameters.ChannelMidiParameter.Type
  langs:
  - csharp
  - vb
  name: VelocitySenseDepth
  nameWithType: ChannelMidiParameter.Type.VelocitySenseDepth
  fullName: SpessaSharp.Synthesizer.Engine.Channel.Parameters.ChannelMidiParameter.Type.VelocitySenseDepth
  type: Field
  source:
    remote:
      path: SpessaSharp/Synthesizer/Engine/Channel/Parameters/ChannelMidiParameter.cs
      branch: master
      repo: git@github.com:Wh1teDuke/SpessaSharp.git
    id: VelocitySenseDepth
    path: ../SpessaSharp/Synthesizer/Engine/Channel/Parameters/ChannelMidiParameter.cs
    startLine: 368
  assemblies:
  - SpessaSharp
  namespace: SpessaSharp.Synthesizer.Engine.Channel.Parameters
  summary: >-
    The relation between the input and the actual velocity.


    <p>

    If Velo Depth is increased, small differences in your playing dynamics will make a large difference in the loudness of the sound.

    If Velo Depth is decreased, even large differences in your playing dynamics will make only a small difference in the loudness of the sound.

    </p>
  remarks: >-
    Examples (with offset being set to normal):


    <ul><li>64 is normal.</li><li>32 is half velocity at max volume.</li><li>127 is max velocity at half volume.</li></ul>


    Refer to <a href="https://cdn.roland.com/assets/media/pdf/SC-8850_OM.pdf">SC-8850 Owner's Manual</a>, page 56.
  example: []
  syntax:
    content: VelocitySenseDepth = 14
    return:
      type: SpessaSharp.Synthesizer.Engine.Channel.Parameters.ChannelMidiParameter.Type
- uid: SpessaSharp.Synthesizer.Engine.Channel.Parameters.ChannelMidiParameter.Type.VelocitySenseOffset
  commentId: F:SpessaSharp.Synthesizer.Engine.Channel.Parameters.ChannelMidiParameter.Type.VelocitySenseOffset
  id: VelocitySenseOffset
  parent: SpessaSharp.Synthesizer.Engine.Channel.Parameters.ChannelMidiParameter.Type
  langs:
  - csharp
  - vb
  name: VelocitySenseOffset
  nameWithType: ChannelMidiParameter.Type.VelocitySenseOffset
  fullName: SpessaSharp.Synthesizer.Engine.Channel.Parameters.ChannelMidiParameter.Type.VelocitySenseOffset
  type: Field
  source:
    remote:
      path: SpessaSharp/Synthesizer/Engine/Channel/Parameters/ChannelMidiParameter.cs
      branch: master
      repo: git@github.com:Wh1teDuke/SpessaSharp.git
    id: VelocitySenseOffset
    path: ../SpessaSharp/Synthesizer/Engine/Channel/Parameters/ChannelMidiParameter.cs
    startLine: 387
  assemblies:
  - SpessaSharp
  namespace: SpessaSharp.Synthesizer.Engine.Channel.Parameters
  summary: >-
    The offset to add to the input velocity.


    If Velo Offset is set higher than 64, even softly played notes (i.e., notes with a low velocity)

    will be sounded loudly. If Velo Offset is set lower than 64,

    even strongly played notes (i.e., notes with a high velocity) will be sounded softly.
  remarks: >-
    Examples (with depth set to normal):


    <ul><li>64 is normal.</li><li>32 is silent until half velocity, max velocity is half volume.</li><li>96 starts at half volume and reaches max volume at half velocity.</li><li>127 always forces velocity to max.</li></ul>


    Refer to <a href="https://cdn.roland.com/assets/media/pdf/SC-8850_OM.pdf">SC-8850 Owner's Manual</a>, page 56.
  example: []
  syntax:
    content: VelocitySenseOffset = 15
    return:
      type: SpessaSharp.Synthesizer.Engine.Channel.Parameters.ChannelMidiParameter.Type
