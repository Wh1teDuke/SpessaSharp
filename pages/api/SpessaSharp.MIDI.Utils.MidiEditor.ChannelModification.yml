  assemblies:
  - SpessaSharp
  namespace: SpessaSharp.MIDI.Utils
  summary: >-
    All controllers that should be modified for this channel.


    <ul><li><b>Key</b>: the MIDI controller number.</li><li><b>Value</b>:


    <ul><li><b>Clear</b> - all controller changes for this controller are removed.</li><li><b>Int</b> - clear + sets the new controller at the start of the song, effectively locking them to the set value.</li></ul></li></ul>
  example: []
  syntax:
    content: public Dictionary<Midi.CC, MidiEditor.Parameter<int>>? Controllers
    return:
      type: System.Collections.Generic.Dictionary{SpessaSharp.MIDI.Midi.CC,SpessaSharp.MIDI.Utils.MidiEditor.Parameter{System.Int32}}
    content.vb: Public Controllers As Dictionary(Of Midi.CC, MidiEditor.Parameter(Of Integer))
