  summary: >-
    The new MIDI parameters of this channel.


    <ul><li><b>Key</b>: the MIDI parameter name.</li><li><b>Value</b>:


    <ul><li><b>Clear</b> - all changes for this parameter are removed.</li><li><b>Specific Value</b> - clear + sets the new parameter at the start of the song, effectively locking them to the set value.</li></ul>

