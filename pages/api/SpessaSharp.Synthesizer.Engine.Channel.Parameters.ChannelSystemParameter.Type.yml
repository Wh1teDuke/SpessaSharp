      branch: master
      repo: git@github.com:Wh1teDuke/SpessaSharp.git
    id: MonophonicRetrigger
    path: ../SpessaSharp/Synthesizer/Engine/Channel/Parameters/ChannelSystemParameter.cs
    startLine: 212
  assemblies:
  - SpessaSharp
  namespace: SpessaSharp.Synthesizer.Engine.Channel.Parameters
  summary: >-
    Indicates whether the channel is in monophonic retrigger mode.

    This emulates the behavior of Microsoft GS Wavetable Synth,

    Where a new note will kill the previous one if it is still playing.

    Overrides the global parameter if set.
  example: []
  syntax:
    content: MonophonicRetrigger = 8
    return:
      type: SpessaSharp.Synthesizer.Engine.Channel.Parameters.ChannelSystemParameter.Type
