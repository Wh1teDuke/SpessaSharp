    id: .ctor
    path: ../SpessaSharp/MIDI/Utils/MidiEditor.cs
    startLine: 60
  assemblies:
  - SpessaSharp
  namespace: SpessaSharp.MIDI.Utils
  summary: >-
    Allows easy editing of the file by removing channels, changing programs,

    changing controllers and transposing channels. Note that this modifies the MIDI in-place.
  example: []
  syntax:
    content: public Options(Dictionary<int, MidiEditor.Parameter<MidiEditor.ChannelModification>>? Channels, MidiEditor.Parameter<object>? DrumSetupParams, Dictionary<GlobalMidiParameter.Type, MidiEditor.Parameter<GlobalMidiParameter>>? MidiParams, MidiEditor.Parameter<Effect.ReverbProcessorSnapshot>? ReverbParams, MidiEditor.Parameter<Effect.ChorusProcessorSnapshot>? ChorusParams, MidiEditor.Parameter<Effect.DelayProcessorSnapshot>? DelayParams, MidiEditor.Parameter<Effect.InsertionProcessorSnapshot>? InsertionParams)
    parameters:
    - id: Channels
      type: System.Collections.Generic.Dictionary{System.Int32,SpessaSharp.MIDI.Utils.MidiEditor.Parameter{SpessaSharp.MIDI.Utils.MidiEditor.ChannelModification}}
      description: >-
        The channel changes.<br />

        - Key: the MIDI channel number.<br />

        - value:<br />
          - <b>Clear</b> - all MIDI messages for this channel, such as Note On are removed.<br />
          - <b>ChannelModification</b> - modifies the channel.
    - id: DrumSetupParams
      type: SpessaSharp.MIDI.Utils.MidiEditor.Parameter{System.Object}
      description: >-
        The drum parameter changes.<br />

        - <b>Clear</b> - all existing drum change MIDI messages are removed.<br />

        - <b>Null</b> - not yet implemented.
    - id: MidiParams
      type: System.Collections.Generic.Dictionary{SpessaSharp.Synthesizer.Engine.Parameters.GlobalMidiParameter.Type,SpessaSharp.MIDI.Utils.MidiEditor.Parameter{SpessaSharp.Synthesizer.Engine.Parameters.GlobalMidiParameter}}
      description: >-
        The global MIDI parameter changes.


        <ul><li>Key: the MIDI parameter name.</li><li>value:


        <ul><li>Clear - all changes for this parameter are removed.</li><li>Specific value - clear + sets the new parameter at the start of the song, effectively locking them to the set value.</li></ul></li></ul>


        Please note that <b>clear</b> is not supported for the <b>system</b> parameter,

        as it may cause issues with the MIDI system detection and reset insertion.
    - id: ReverbParams
      type: SpessaSharp.MIDI.Utils.MidiEditor.Parameter{SpessaSharp.Synthesizer.Engine.Effects.Effect.ReverbProcessorSnapshot}
      description: >-
        The desired GS reverb parameters.<br />

        - <b>Clear</b> - all existing parameter change MIDI messages are removed.<br />

        - <b>ReverbProcessorSnapshot</b> - clear + the new parameters are set via System Exclusive messages.
    - id: ChorusParams
      type: SpessaSharp.MIDI.Utils.MidiEditor.Parameter{SpessaSharp.Synthesizer.Engine.Effects.Effect.ChorusProcessorSnapshot}
      description: >-
        The GS chorus parameters.<br />

        - <b>Clear</b> - all existing parameter change MIDI messages are cleared.<br />

        - <b>ChorusProcessorSnapshot</b> - clear + the new parameters are set via System Exclusive messages.
    - id: DelayParams
      type: SpessaSharp.MIDI.Utils.MidiEditor.Parameter{SpessaSharp.Synthesizer.Engine.Effects.Effect.DelayProcessorSnapshot}
      description: >-
        The GS delay parameters.<br />

        - <b>Clear</b> - all existing parameter change MIDI messages are cleared.<br />

        - <b>DelayProcessorSnapshot</b> - clear + the new parameters are set via System Exclusive messages.
    - id: InsertionParams
      type: SpessaSharp.MIDI.Utils.MidiEditor.Parameter{SpessaSharp.Synthesizer.Engine.Effects.Effect.InsertionProcessorSnapshot}
      description: >-
        The GS Insertion Effect parameters.<br />

        - <b>Clear</b> - all existing parameter change MIDI messages are cleared.<br />

        - <b>InsertionProcessorSnapshot</b> - clear + the new parameters are set via System Exclusive messages.
