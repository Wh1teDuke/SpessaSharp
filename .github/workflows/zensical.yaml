name: Publish SpessaSharp docs to Github pages

on:
  push:
    branches:
      - master
    paths:
      - 'pages/**'
      - 'SpessaSharp/**'
  workflow_dispatch:

permissions:
  actions: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: true

      - name: Dotnet Setup
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Zensical
        run: dotnet tool install -g zensical

      - name: Build Zensical Site
        working-directory: pages
        run: zensical build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'pages/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5